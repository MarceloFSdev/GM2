# Cloudflare configuration for the CHRONOS GMT Pages project.
# This file makes the KV binding explicit and enables local dev with
# `npx wrangler pages dev .` (which runs functions/ + a local KV simulation).
#
# Bindings can alternatively be set entirely in the Pages dashboard
# (Settings -> Functions -> KV namespace bindings); this file just documents them.

name = "gm2-chronos"
pages_build_output_dir = "."
compatibility_date = "2026-01-01"

# To-Do list storage. Create a namespace with:
#   npx wrangler kv namespace create TODOS_KV
#   npx wrangler kv namespace create TODOS_KV --preview
# then paste the printed ids below (local `pages dev` ignores them and uses a
# local store, so you can develop before filling these in).
[[kv_namespaces]]
binding = "TODOS_KV"
id = "REPLACE_WITH_PRODUCTION_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_NAMESPACE_ID"
